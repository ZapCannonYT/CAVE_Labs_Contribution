# Scroll down to the bottom using explicit vertical swipes on the left margin (to avoid hitting the horizontal timeline scrollview)
- swipe:
    start: 10%, 80%
    end: 10%, 20%
- swipe:
    start: 10%, 80%
    end: 10%, 20%

- tapOn: "Launch My Dashboard"

# Give the dashboard time to load and navigate
- runScript: ../sleep500ms.js
- runScript: ../sleep500ms.js

# Ensure dashboard loads
- assertVisible: "VitalHealth"
- assertVisible: "Live Telemetry"
- takeScreenshot: .maestro/screenshots/09_dashboard
